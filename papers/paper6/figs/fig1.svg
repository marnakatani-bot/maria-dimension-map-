<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="900" height="560" fill="#ffffff"/>

  <!-- top note -->
  <text x="450" y="28" font-size="14" text-anchor="middle" fill="#333333">9次元は中心＝基点であり最高位ではない（優劣なき並列構造）</text>

  <!-- Seed of Life faint background circles -->
  <g fill="none" stroke="#999999" stroke-width="1" opacity="0.15">
    <circle cx="450" cy="150" r="95"/>
    <circle cx="588" cy="230" r="95"/>
    <circle cx="588" cy="390" r="95"/>
    <circle cx="450" cy="470" r="95"/>
    <circle cx="312" cy="390" r="95"/>
    <circle cx="312" cy="230" r="95"/>
    <circle cx="450" cy="310" r="85"/>
  </g>

  <!-- 3D -->
  <text x="450" y="115" font-size="13" text-anchor="middle" fill="#333333">3D</text>
  <text x="450" y="132" font-size="11.5" text-anchor="middle" fill="#333333">人間同士</text>

  <!-- 3.5D (overlap between 3D and 4D) -->
  <text x="519" y="168" font-size="10.5" text-anchor="middle" fill="#555555">3.5D 動植物・鉱物</text>

  <!-- 4D -->
  <text x="588" y="196" font-size="13" text-anchor="middle" fill="#333333">4D</text>
  <text x="588" y="213" font-size="11.5" text-anchor="middle" fill="#333333">創造主・マスター的存在</text>

  <!-- 5D highlighted amber -->
  <circle cx="588" cy="390" r="95" fill="#d29922" opacity="0.10"/>
  <text x="588" y="378" font-size="14" text-anchor="middle" fill="#8a6d1a">5D</text>
  <text x="588" y="396" font-size="11.5" text-anchor="middle" fill="#8a6d1a">宇宙の源・境界融解</text>
  <text x="588" y="412" font-size="11.5" text-anchor="middle" fill="#8a6d1a">（情動を伴う）</text>

  <!-- 6D -->
  <text x="450" y="465" font-size="13" text-anchor="middle" fill="#6e7781">6D</text>
  <text x="450" y="482" font-size="11.5" text-anchor="middle" fill="#6e7781">無・空・感覚なし</text>

  <!-- 7D -->
  <text x="312" y="396" font-size="13" text-anchor="middle" fill="#333333">7D</text>
  <text x="312" y="413" font-size="11.5" text-anchor="middle" fill="#333333">情報コード・俯瞰</text>

  <!-- 8D -->
  <text x="312" y="222" font-size="13" text-anchor="middle" fill="#333333">8D</text>
  <text x="312" y="239" font-size="11.5" text-anchor="middle" fill="#333333">法則・パターン</text>

  <!-- 9D center highlighted blue -->
  <circle cx="450" cy="310" r="85" fill="#1f6feb" opacity="0.12"/>
  <text x="450" y="300" font-size="15" text-anchor="middle" fill="#1f6feb">9D</text>
  <text x="450" y="318" font-size="11.5" text-anchor="middle" fill="#1f6feb">多次元宇宙の源</text>
  <text x="450" y="334" font-size="11.5" text-anchor="middle" fill="#1f6feb">感覚が無いが有る</text>

  <!-- bottom note -->
  <text x="450" y="530" font-size="12" text-anchor="middle" fill="#333333">24時間そもそもワンネス。次元ごとに『何と一体になっているか』の焦点が異なるだけ（原典economy.md）</text>

  <!-- footer -->
  <text x="880" y="550" font-size="11" text-anchor="end" fill="#6e7781">全物理・情報理論用語は構造的類比（本文5.4参照）／峻別は構造の違いであり価値の序列ではない（本文5.5参照）</text>
</svg>
