<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <!-- headers -->
  <rect x="60" y="40" width="390" height="42" fill="#d29922" opacity="0.20"/>
  <rect x="510" y="40" width="390" height="42" fill="#1f6feb" opacity="0.18"/>
  <text x="255" y="67" font-size="16" text-anchor="middle" fill="#8a6d1a">5次元ワンネス</text>
  <text x="705" y="67" font-size="16" text-anchor="middle" fill="#1f6feb">9次元ワンネス</text>

  <!-- center top red note -->
  <text x="480" y="28" font-size="12" text-anchor="middle" fill="#cf222e">峻別は構造の違いの記述であって価値の階梯ではない。5Dを未熟・9Dを上位とする序列化は禁止（本文5.5）</text>

  <!-- lane separators -->
  <line x1="60" y1="92" x2="900" y2="92" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="252" x2="900" y2="252" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="412" x2="900" y2="412" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="500" x2="900" y2="500" stroke="#cccccc" stroke-width="1"/>
  <line x1="480" y1="92" x2="480" y2="500" stroke="#dddddd" stroke-width="1"/>

  <!-- lane 1 label -->
  <text x="480" y="112" font-size="13" text-anchor="middle" fill="#555555">体験構造：一体化の対象</text>
  <text x="255" y="140" font-size="12.5" text-anchor="middle" fill="#333333">形をもった物体・存在</text>
  <text x="255" y="158" font-size="12.5" text-anchor="middle" fill="#333333">（自然・地球・他者・星・宇宙）</text>
  <text x="255" y="178" font-size="12.5" text-anchor="middle" fill="#333333">境界融解／局所的</text>
  <text x="255" y="196" font-size="12.5" text-anchor="middle" fill="#333333">情動を随伴（情動＝3D生体反応）</text>

  <text x="705" y="140" font-size="12.5" text-anchor="middle" fill="#1f6feb">前言語的な純粋情報のうねり</text>
  <text x="705" y="158" font-size="12.5" text-anchor="middle" fill="#1f6feb">五感の滅／全域的</text>
  <text x="705" y="176" font-size="12.5" text-anchor="middle" fill="#1f6feb">『感覚が無いが有る』</text>

  <!-- lane 1 bottom red notes about 情動 -->
  <text x="255" y="222" font-size="11" text-anchor="middle" fill="#cf222e">情動を伴うが『感情次元』ではない。</text>
  <text x="255" y="236" font-size="11" text-anchor="middle" fill="#cf222e">情動＝3D生体反応の随伴（本文3.3）</text>

  <!-- lane 2: 仏教対応 (purple band) -->
  <rect x="60" y="252" width="840" height="160" fill="#8250df" opacity="0.10"/>
  <text x="480" y="272" font-size="13" text-anchor="middle" fill="#5a2ea6">仏教対応（対応であって同一ではない）</text>
  <text x="255" y="330" font-size="13" text-anchor="middle" fill="#333333">菩薩道・自他不二・縁起</text>
  <text x="705" y="330" font-size="13" text-anchor="middle" fill="#1f6feb">法無我・華厳の法界</text>
  <text x="480" y="395" font-size="11" text-anchor="middle" fill="#5a2ea6">※6D＝人無我（魂は残る）を中間参照点として距離を測る</text>

  <!-- lane 3: 記述可能性 -->
  <text x="480" y="432" font-size="13" text-anchor="middle" fill="#555555">記述可能性</text>
  <text x="255" y="460" font-size="13" text-anchor="middle" fill="#333333">記述可能（体感として語りうる）</text>
  <text x="705" y="460" font-size="13" text-anchor="middle" fill="#1f6feb">記述困難（前言語的・迂遠な表現に依存）</text>

  <!-- footer -->
  <text x="900" y="588" font-size="11" text-anchor="end" fill="#6e7781">全物理・情報理論用語は構造的類比（本文5.4参照）／峻別は構造の違いであり価値の序列ではない（本文5.5参照）</text>
</svg>
