<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>

  <text x="480" y="30" font-size="16" text-anchor="middle" fill="#333333">経済形態</text>
  <text x="480" y="30" font-size="16" text-anchor="middle" fill="#333333" opacity="0"> </text>
  <text x="230" y="45" font-size="16" text-anchor="middle" fill="#555555">経済形態（左）</text>
  <text x="730" y="45" font-size="16" text-anchor="middle" fill="#555555">ワンネスの焦点（右）</text>

  <!-- left edge note -->
  <text x="10" y="65" font-size="14" fill="#cf222e">並列（優劣なし）</text>

  <!-- rows: 3D 4D 5D 6D 7D 8D 9D at y positions -->
  <!-- 3D -->
  <line x1="150" y1="80" x2="810" y2="80" stroke="#eeeeee" stroke-width="1"/>
  <text x="60" y="85" font-size="14" fill="#333333">3D</text>
  <text x="230" y="85" font-size="13" text-anchor="middle" fill="#333333">欠乏補完経済（交換・取引）</text>
  <text x="730" y="85" font-size="13" text-anchor="middle" fill="#333333">人間同士</text>

  <!-- 4D -->
  <line x1="150" y1="140" x2="810" y2="140" stroke="#eeeeee" stroke-width="1"/>
  <text x="60" y="145" font-size="14" fill="#333333">4D</text>
  <text x="230" y="145" font-size="13" text-anchor="middle" fill="#333333">願望経済（自己実現）</text>
  <text x="730" y="145" font-size="13" text-anchor="middle" fill="#333333">創造主的存在</text>

  <!-- 5D highlighted amber -->
  <rect x="40" y="175" width="880" height="46" fill="#d29922" opacity="0.12"/>
  <text x="60" y="203" font-size="14" fill="#8a6d1a">5D</text>
  <text x="230" y="203" font-size="13" text-anchor="middle" fill="#8a6d1a">純粋贈与・感謝経済（循環）</text>
  <text x="730" y="203" font-size="13" text-anchor="middle" fill="#8a6d1a">宇宙の源・境界融解</text>
  <line x1="290" y1="198" x2="670" y2="198" stroke="#d29922" stroke-width="1" opacity="0.5"/>

  <!-- 6D -->
  <line x1="150" y1="260" x2="810" y2="260" stroke="#eeeeee" stroke-width="1"/>
  <text x="60" y="265" font-size="14" fill="#6e7781">6D</text>
  <text x="230" y="265" font-size="13" text-anchor="middle" fill="#6e7781">経済概念の消失（自然流動）</text>
  <text x="730" y="265" font-size="13" text-anchor="middle" fill="#6e7781">無・空</text>

  <!-- 7D -->
  <line x1="150" y1="320" x2="810" y2="320" stroke="#eeeeee" stroke-width="1"/>
  <text x="60" y="325" font-size="14" fill="#333333">7D</text>
  <text x="230" y="325" font-size="13" text-anchor="middle" fill="#333333">情報コード経済（役割・構造）</text>
  <text x="730" y="325" font-size="13" text-anchor="middle" fill="#333333">情報コード</text>

  <!-- 8D -->
  <line x1="150" y1="380" x2="810" y2="380" stroke="#eeeeee" stroke-width="1"/>
  <text x="60" y="385" font-size="14" fill="#333333">8D</text>
  <text x="230" y="385" font-size="13" text-anchor="middle" fill="#333333">法則経済（必要経費が流れる）</text>
  <text x="730" y="385" font-size="13" text-anchor="middle" fill="#333333">法則</text>

  <!-- 9D highlighted blue -->
  <rect x="40" y="415" width="880" height="46" fill="#1f6feb" opacity="0.12"/>
  <text x="60" y="443" font-size="14" fill="#1f6feb">9D</text>
  <text x="230" y="443" font-size="13" text-anchor="middle" fill="#1f6feb">谷町経済（観測×構造×価値の自動生成）</text>
  <text x="730" y="443" font-size="13" text-anchor="middle" fill="#1f6feb">多次元宇宙の源</text>
  <line x1="290" y1="438" x2="670" y2="438" stroke="#1f6feb" stroke-width="1" opacity="0.5"/>

  <!-- right column note -->
  <text x="730" y="490" font-size="12" text-anchor="middle" fill="#555555">ワンネスの詳細・5D/9D峻別は論文⑥（中谷2026g）参照</text>

  <!-- left edge red note -->
  <text x="20" y="510" font-size="14" fill="#cf222e">縦の配列は並列的観測レイヤーであり上下の優劣ではない（本文2.2）。</text>
  <text x="20" y="527" font-size="14" fill="#cf222e">9Dは中心＝基点であり最高位ではない</text>

  <!-- bottom note -->
  <text x="480" y="545" font-size="12" text-anchor="middle" fill="#333333">それぞれの次元の経済を味わい尽くす（原典economy.md）</text>

  <!-- footer -->
  <text x="940" y="553" font-size="10.5" text-anchor="end" fill="#6e7781">全物理・数学用語は構造的類比（本文4.5参照）／経済形態の配列は並列であり価値の序列ではない（本文2.2・3.4参照）</text>
</svg>
