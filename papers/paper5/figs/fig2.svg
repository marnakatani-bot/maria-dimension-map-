<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="900" height="520" fill="#ffffff"/>

  <!-- headers -->
  <rect x="60" y="40" width="360" height="40" fill="#6e7781" opacity="0.25"/>
  <rect x="480" y="40" width="360" height="40" fill="#1f6feb" opacity="0.20"/>
  <text x="240" y="66" font-size="16" text-anchor="middle" fill="#333333">推し文化経済</text>
  <text x="660" y="66" font-size="16" text-anchor="middle" fill="#1f6feb">谷町経済</text>

  <!-- center top red note -->
  <text x="450" y="30" font-size="12" text-anchor="middle" fill="#cf222e">この分岐は起動している視座の経済形態の違いの記述であり、優劣ではない（本文3.3・3.4）</text>

  <!-- lane separators -->
  <line x1="60" y1="90" x2="840" y2="90" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="164" x2="840" y2="164" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="238" x2="840" y2="238" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="312" x2="840" y2="312" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="386" x2="840" y2="386" stroke="#cccccc" stroke-width="1"/>
  <line x1="60" y1="460" x2="840" y2="460" stroke="#cccccc" stroke-width="1"/>
  <line x1="450" y1="90" x2="450" y2="460" stroke="#dddddd" stroke-width="1"/>

  <!-- lane labels (center) -->
  <text x="450" y="107" font-size="13" text-anchor="middle" fill="#555555">起点</text>
  <text x="450" y="181" font-size="13" text-anchor="middle" fill="#555555">関係性</text>
  <text x="450" y="255" font-size="13" text-anchor="middle" fill="#555555">投じる対象</text>
  <text x="450" y="329" font-size="13" text-anchor="middle" fill="#555555">リターン期待</text>
  <text x="450" y="403" font-size="13" text-anchor="middle" fill="#555555">時間軸</text>

  <!-- lane 1: 起点 -->
  <text x="240" y="130" font-size="13" text-anchor="middle" fill="#333333">欠乏（3D身体反応の渇望）</text>
  <text x="660" y="130" font-size="13" text-anchor="middle" fill="#1f6feb">充足（共鳴の観測）</text>
  <text x="240" y="150" font-size="11.5" text-anchor="middle" fill="#cf222e">欠乏＝3次元の身体的生体反応。情動は3D生体反応であり</text>

  <!-- lane 2: 関係性 -->
  <text x="240" y="204" font-size="13" text-anchor="middle" fill="#333333">消費者 ↔ 提供者</text>
  <text x="660" y="204" font-size="13" text-anchor="middle" fill="#1f6feb">共同創造者 ↔ 共同創造者</text>

  <!-- lane 3: 投じる対象 -->
  <text x="240" y="278" font-size="13" text-anchor="middle" fill="#333333">個人への課金（応援・所有感・承認）</text>
  <text x="660" y="278" font-size="13" text-anchor="middle" fill="#1f6feb">構造・ミッションへの共鳴投資</text>

  <!-- lane 4: リターン期待 -->
  <text x="240" y="352" font-size="12.5" text-anchor="middle" fill="#333333">返礼・特典・つながりの実感を求める</text>
  <text x="660" y="352" font-size="12.5" text-anchor="middle" fill="#1f6feb">見返りを前提としない（長期の循環への参加）</text>

  <!-- lane 5: 時間軸 -->
  <text x="240" y="426" font-size="13" text-anchor="middle" fill="#333333">今の満足・即時の反応</text>
  <text x="660" y="426" font-size="13" text-anchor="middle" fill="#1f6feb">長期の継承と循環</text>

  <!-- bottom red note (from lane1 explanation continued) -->
  <text x="240" y="440" font-size="11" text-anchor="middle" fill="#cf222e">経済形態と同一ではない（本文3.2）</text>

  <!-- footer -->
  <text x="840" y="510" font-size="11" text-anchor="end" fill="#6e7781">全物理・数学用語は構造的類比（本文4.5参照）／経済形態の配列は並列であり価値の序列ではない（本文2.2・3.4参照）</text>
</svg>
