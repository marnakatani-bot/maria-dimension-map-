<svg viewBox="0 0 800 960" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="800" height="960" fill="#ffffff"/>

  <defs>
    <marker id="af5" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>

  <!-- top band red note -->
  <rect x="0" y="0" width="800" height="30" fill="#cf222e" opacity="0.08"/>
  <text x="400" y="19" font-size="12" text-anchor="middle" fill="#cf222e">本フローの到達点は検証プロトコルの設計・登録。『検証済み』とは読まない（本文5.1）</text>

  <!-- Node 1 -->
  <rect x="180" y="40" width="440" height="55" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="72" font-size="13" text-anchor="middle" fill="#111111">① 観測期間の事前設定（記録開始前に固定・変更禁止）</text>
  <line x1="400" y1="95" x2="400" y2="118" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- Node 2 -->
  <rect x="180" y="118" width="440" height="55" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="141" font-size="12.5" text-anchor="middle" fill="#111111">② 観測者の視座判定：論文④の2指標</text>
  <text x="400" y="158" font-size="12.5" text-anchor="middle" fill="#111111">〔失効率・脱物語化度〕（in prep）</text>
  <line x1="400" y1="173" x2="400" y2="196" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- Node 3 -->
  <rect x="180" y="196" width="440" height="70" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="216" font-size="12" text-anchor="middle" fill="#111111">③ 相手の視座判定：外部帰属にとどまる旨を明記</text>
  <text x="400" y="232" font-size="12" text-anchor="middle" fill="#111111">／可能なら相手の一人称データ</text>
  <text x="400" y="248" font-size="12" text-anchor="middle" fill="#111111">（論文④他者判定拡張・未完）</text>
  <line x1="400" y1="266" x2="400" y2="289" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- side note for ②③ -->
  <text x="640" y="150" font-size="11" fill="#cf222e">④公刊・他者判定拡張の前は</text>
  <text x="640" y="163" font-size="11" fill="#cf222e">検証データではなく登録材料</text>
  <text x="640" y="176" font-size="11" fill="#cf222e">（本文5.2・6.2条件1）</text>
  <text x="640" y="230" font-size="11" fill="#cf222e">遡及当てはめ禁止＝</text>
  <text x="640" y="243" font-size="11" fill="#cf222e">前向き記録のみ</text>
  <text x="640" y="256" font-size="11" fill="#cf222e">（本文6.2条件3）</text>

  <!-- Node 4 -->
  <rect x="180" y="289" width="440" height="50" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="319" font-size="13" text-anchor="middle" fill="#111111">④ 視座差 Δ の算定</text>
  <line x1="400" y1="339" x2="400" y2="362" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- Node 5 -->
  <rect x="180" y="362" width="440" height="55" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="385" font-size="12.5" text-anchor="middle" fill="#111111">⑤ 経済的流動の記録：成立・不成立の両方を</text>
  <text x="400" y="402" font-size="12.5" text-anchor="middle" fill="#111111">逐語記録（付録A）</text>
  <line x1="400" y1="417" x2="400" y2="440" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- Node 6 diamond -->
  <polygon points="400,440 640,505 400,570 160,505" fill="#ffffff" stroke="#d29922" stroke-width="2"/>
  <text x="400" y="498" font-size="12" text-anchor="middle" fill="#111111">⑥ 共変要因（相手の資力・偶発事情・</text>
  <text x="400" y="514" font-size="12" text-anchor="middle" fill="#111111">外的変化）があるか？</text>
  <text x="650" y="500" font-size="12" fill="#111111">Yes</text>
  <line x1="400" y1="570" x2="400" y2="593" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <path d="M 640 505 L 720 505 L 720 460" fill="none" stroke="#cf222e" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#af5)"/>
  <text x="725" y="475" font-size="11" fill="#cf222e">判定保留</text>
  <text x="725" y="488" font-size="11" fill="#cf222e">（本文6.2条件4）</text>

  <!-- Node 7 diamond -->
  <polygon points="400,593 650,655 400,717 150,655" fill="#ffffff" stroke="#d29922" stroke-width="2"/>
  <text x="400" y="648" font-size="12" text-anchor="middle" fill="#111111">⑦ Δ=2 か？</text>
  <text x="400" y="664" font-size="12" text-anchor="middle" fill="#111111">流動は成立したか？</text>
  <line x1="400" y1="717" x2="400" y2="740" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- Node 8 -->
  <rect x="180" y="740" width="440" height="55" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="763" font-size="12.5" text-anchor="middle" fill="#111111">⑧ 対照記録：Δ=2成立率 vs Δ≠2成立率</text>
  <line x1="400" y1="795" x2="400" y2="818" stroke="#333333" stroke-width="1.5" marker-end="url(#af5)"/>

  <!-- Node 9 diamond -->
  <polygon points="400,818 660,868 400,918 140,868" fill="#ffffff" stroke="#d29922" stroke-width="2"/>
  <text x="400" y="860" font-size="11.5" text-anchor="middle" fill="#111111">⑨ 反証型1（Δ≠2で成立の系統的蓄積）／</text>
  <text x="400" y="875" font-size="11.5" text-anchor="middle" fill="#111111">反証型2（Δ=2で不成立の系統的蓄積）？</text>

  <line x1="140" y1="868" x2="40" y2="868" stroke="#333333" stroke-width="1.5"/>
  <text x="90" y="858" font-size="11" fill="#333333">No</text>
  <rect x="0" y="878" width="180" height="40" fill="none" stroke="#2da44e" stroke-width="1.5" rx="8"/>
  <text x="90" y="902" font-size="10.5" text-anchor="middle" fill="#2da44e">継続記録（登録段階を維持）</text>

  <line x1="660" y1="868" x2="760" y2="868" stroke="#333333" stroke-width="1.5"/>
  <text x="710" y="858" font-size="11" fill="#333333">Yes</text>
  <rect x="620" y="878" width="180" height="40" fill="none" stroke="#cf222e" stroke-width="1.5" rx="8"/>
  <text x="710" y="902" font-size="10.5" text-anchor="middle" fill="#cf222e">仮説の棄却・修正（本文6.1）</text>

  <!-- footer -->
  <text x="780" y="945" font-size="10.5" text-anchor="end" fill="#6e7781">全物理・数学用語は構造的類比（本文4.5参照）／経済形態の配列は並列であり価値の序列ではない（本文2.2・3.4参照）</text>
</svg>
